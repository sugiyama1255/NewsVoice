{% load static %}
<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}NewsVoice{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'newsvoice/styles.css' %}">
</head>
<body>
<header class="site-header">
    <a class="brand" href="{% url 'newsvoice:index' %}">NewsVoice</a>
    {% if request.user.is_authenticated %}
        <nav class="header-actions" aria-label="アカウント">
            <span class="header-username">{{ request.user.get_username }}</span>
            <a class="header-button" href="{% url 'newsvoice:tts_settings' %}">音声設定</a>
            <a class="header-button" href="{% url 'newsvoice:settings' %}">設定</a>
            <a class="header-button" href="{% url 'newsvoice:logout' %}">ログアウト</a>
        </nav>
    {% endif %}
</header>
<main class="page">
    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <p class="message {{ message.tags }}">{{ message }}</p>
            {% endfor %}
        </div>
    {% endif %}
    {% block content %}{% endblock %}
</main>
<script src="{% static 'newsvoice/speech.js' %}"></script>
</body>
</html>
