{% load static %}
<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}NewsVoice{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'newsvoice/styles.css' %}">
</head>
<body>
<header class="site-header">
    <a class="brand" href="{% url 'newsvoice:index' %}">NewsVoice</a>
</header>
<main class="page">
    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <p class="message {{ message.tags }}">{{ message }}</p>
            {% endfor %}
        </div>
    {% endif %}
    {% block content %}{% endblock %}
</main>
<script src="{% static 'newsvoice/speech.js' %}"></script>
</body>
</html>
